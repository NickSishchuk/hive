spring:
  application:
    name: hive
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hive}
    username: ${DB_USER:hive}
    password: ${DB_PASSWORD:hive}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
server:
  port: 8080
hive:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-256-bit-key-that-is-long-enough-for-jwt-hs256}
    access-token-expiration-ms: 900000
    refresh-token-expiration-days: 30
livekit:
  url: ${LIVEKIT_URL:https://your-project.livekit.cloud}
  api-key: ${LIVEKIT_API_KEY:your_api_key}
  api-secret: ${LIVEKIT_API_SECRET:your_api_secret}
  ws-url: ${LIVEKIT_WS_URL:wss://your-project.livekit.cloud}
---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
logging:
  level:
    com.hive: DEBUG
    org.springframework.security: DEBUG
