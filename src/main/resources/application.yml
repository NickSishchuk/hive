spring:
  application:
    name: hive

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hive}
    username: ${DB_USER:hive}
    password: ${DB_PASSWORD:hive}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

hive:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-change-in-production-please}
    access-token-expiration-ms: 900000       # 15 minutes
    refresh-token-expiration-days: 30

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

logging:
  level:
    com.hive: DEBUG
    org.springframework.security: DEBUG
