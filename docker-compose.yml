services:
  postgres:
    image: postgres:16-alpine
    container_name: hive-postgres
    environment:
      POSTGRES_DB: hive
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    ports:
      - "5433:5432"
    volumes:
      - hive-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d hive"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    container_name: hive-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hive
      DB_USER: hive
      DB_PASSWORD: hive
      JWT_SECRET: this-is-a-super-long-jwt-secret-key-that-is-definitely-more-than-32-bytes-long-for-hs256-algorithm
      # ── LiveKit Cloud ────────────────────────────────────────────────────────
      # Get these three values from https://cloud.livekit.io → your project → Settings
      LIVEKIT_URL: https://hive.livekit.cloud
      LIVEKIT_API_KEY: APImnzVeXqWm65o
      LIVEKIT_API_SECRET: RgF420eCyMQbcwozx4vOY7ly82f8RjaLbSL1APEAnaB
      # This is the URL the browser connects to — same host, ws/wss scheme
      LIVEKIT_WS_URL: wss://hive-rbzrf4z8.livekit.cloud
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: hive-frontend
    ports:
      - "3000:80"
      - "3443:443"
    depends_on:
      - app

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hive-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hive.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  hive-postgres-data: