spring:
  config:
    activate:
      on-profile: docker

  # PostgreSQL - use container hostname
  datasource:
    url: jdbc:postgresql://postgres:5432/hive
    username: hive
    password: hive_secret

  # JPA - auto-create schema in Docker for easy setup
  jpa:
    hibernate:
      ddl-auto: update

  # Redis - use container hostname
  data:
    redis:
      host: redis
      port: 6379

# Logging for containerized environment
logging:
  level:
    root: INFO
    com.hive: INFO
